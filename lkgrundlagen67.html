<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vokabeltrainer: Russische Sprechverben</title>
    <style>
        :root {
            --primary-green: #2e7d32;
            --light-green: #e8f5e9;
            --dark-green: #1b5e20;
            --accent-green: #4caf50;
            --text-color: #333;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-green);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: var(--dark-green);
            margin-bottom: 10px;
            text-align: center;
            font-size: 1.8rem;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .progress {
            font-weight: bold;
            color: var(--primary-green);
            font-size: 1.1rem;
        }

        /* Flashcard 3D Effekt */
        .flashcard-container {
            width: 100%;
            height: 350px;
            perspective: 1000px;
            cursor: pointer;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: var(--card-shadow);
            border-radius: 20px;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            border-radius: 20px;
            background: white;
            border: 4px solid var(--primary-green);
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #fff;
        }

        .face-label {
            position: absolute;
            top: 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
        }

        .card-content {
            font-size: 2rem;
            font-weight: bold;
            word-wrap: break-word;
            max-width: 100%;
        }

        .note {
            margin-top: 15px;
            font-size: 1rem;
            font-weight: normal;
            color: #666;
            font-style: italic;
        }

        /* Steuerung */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .nav-buttons, .action-buttons {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
            grid-column: span 2;
        }

        button {
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background-color: var(--primary-green);
            color: white;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:hover {
            background-color: var(--dark-green);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background-color: var(--accent-green);
        }

        .keyboard-hint {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #777;
            text-align: center;
            line-height: 1.5;
        }

        /* Responsive Anpassungen */
        @media (max-width: 480px) {
            .flashcard-container { height: 280px; }
            .card-content { font-size: 1.5rem; }
            h1 { font-size: 1.4rem; }
            button { padding: 10px 12px; font-size: 0.9rem; }
            .keyboard-hint { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Russisch-Vokabeln</h1>
    <div class="progress" id="progress">1 / 50</div>

    <div class="flashcard-container" onclick="flipCard()">
        <div class="flashcard" id="card">
            <div class="card-face card-front">
                <div class="face-label">Russisch</div>
                <div class="card-content" id="frontText">Загрузка...</div>
            </div>
            <div class="card-face card-back">
                <div class="face-label">Deutsch</div>
                <div class="card-content" id="backText">Laden...</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="nav-buttons">
            <button onclick="prevCard()">← Vorherige</button>
            <button onclick="nextCard()">Nächste →</button>
        </div>
        <div class="action-buttons">
            <button class="btn-secondary" onclick="shuffleCards()">🔀 Mischen</button>
            <button class="btn-secondary" onclick="resetToStart()">🏠 An den Anfang</button>
        </div>
    </div>

    <div class="keyboard-hint">
        Tastatur: [Leertaste/Enter] Umdrehen | [←/→] Navigieren | [Pos1/Home] Anfang
    </div>
</div>

<script>
    // Rohdaten der Vokabelliste
    const rawData = `
1.	говори́ть / сказа́ть – sagen, mitteilen
2.	разгова́ривать / поговори́ть – sich unterhalten, sprechen (Dialog)
3.	расска́зывать / рассказа́ть – erzählen, berichten (ausführlich)
4.	болта́ть / поболта́ть – plaudern, quatschen
5.	спра́шивать / спроси́ть – fragen
6.	отвеча́ть / отве́тить – antworten
7.	сообща́ть / сообщи́ть – mitteilen, benachrichtigen
8.	обсужда́ть / обсуди́ть – besprechen, diskutieren
9.	объясня́ть / объясни́ть – erklären
10.	повторя́ть / повтори́ть – wiederholen
11.	сове́товать / посове́товать – raten, empfehlen
12.	обеща́ть / пообеща́ть – versprechen
13.	предлага́ть / предложи́ть – vorschlagen, anbieten
14.	передава́ть / переда́ть – ausrichten, übermitteln
15.	врать / совра́ть – lügen
16.	пра́вда – Wahrheit
17.	ложь – Lüge
18.	секре́т – Geheimnis
19.	ска́зка – Märchen
20.	исто́рия – Geschichte
21.	но́вость – Neuigkeit, Nachricht
22.	анекдо́т – Witz, Anekdote
23.	сло́во – Wort
24.	фра́за – Phrase, Satz
25.	предложе́ние – Satz, Vorschlag
26.	мне́ние – Meinung
27.	сове́т – Rat, Ratschlag
28.	информа́ция – Information
29.	сообще́ние – Nachricht, Mitteilung
30.	те́ма – Thema
31.	встре́ча – Treffen
32.	пое́здка – Reise, Fahrt
33.	де́тство – Kindheit
34.	друг / подру́га – Freund / Freundin
35.	учи́тель – Lehrer
36.	профе́ссор – Professor
37.	роди́тели – Eltern
38.	собесе́дник – Gesprächspartner
39.	дире́ктор – Direktor
40.	специали́ст – Spezialist, Fachmann
41.	внима́тельно – aufmerksam
42.	подро́бно – ausführlich, detailliert
43.	ти́хо – leise
44.	гро́мко – laut
45.	ме́дленно – langsam
46.	бы́стро – schnell
47.	че́стно – ehrlich
48.	интере́сно – interessant
49.	ко́ротко – kurz, knapp
50.	я́сно – klar, deutlich`;

    let cards = [];
    let currentIndex = 0;

    // Daten parsen
    function parseData() {
        const lines = rawData.trim().split('\n');
        cards = lines.map(line => {
            // Entferne die Nummerierung am Anfang (z.B. "1. ")
            const cleanLine = line.replace(/^\d+\.\t?/, '').trim();
            // Trenne Russisch und Deutsch am Bindestrich oder Gedankenstrich
            const parts = cleanLine.split(/ – | - /);
            return {
                front: parts[0] ? parts[0].trim() : '',
                back: parts[1] ? parts[1].trim() : ''
            };
        });
    }

    function updateCardDisplay() {
        const cardElement = document.getElementById('card');
        const frontText = document.getElementById('frontText');
        const backText = document.getElementById('backText');
        const progress = document.getElementById('progress');

        // Karte zurücksetzen (umdrehen auf Vorderseite) bevor neue Daten kommen
        cardElement.classList.remove('is-flipped');

        setTimeout(() => {
            const currentCard = cards[currentIndex];
            frontText.innerText = currentCard.front;
            backText.innerText = currentCard.back;
            
            // Dynamische Schriftgröße
            adjustFontSize(frontText);
            adjustFontSize(backText);

            progress.innerText = `${currentIndex + 1} / ${cards.length}`;
        }, 150);
    }

    function adjustFontSize(element) {
        const text = element.innerText;
        if (text.length > 30) {
            element.style.fontSize = "1.2rem";
        } else if (text.length > 20) {
            element.style.fontSize = "1.5rem";
        } else {
            element.style.fontSize = "2rem";
        }
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('is-flipped');
    }

    function nextCard() {
        if (currentIndex < cards.length - 1) {
            currentIndex++;
            updateCardDisplay();
        } else {
            // Optional: Loop zum Anfang
            currentIndex = 0;
            updateCardDisplay();
        }
    }

    function prevCard() {
        if (currentIndex > 0) {
            currentIndex--;
            updateCardDisplay();
        } else {
            // Optional: Loop zum Ende
            currentIndex = cards.length - 1;
            updateCardDisplay();
        }
    }

    function shuffleCards() {
        // Fisher-Yates Shuffle
        for (let i = cards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cards[i], cards[j]] = [cards[j], cards[i]];
        }
        currentIndex = 0;
        updateCardDisplay();
    }

    function resetToStart() {
        currentIndex = 0;
        updateCardDisplay();
    }

    // Tastatursteuerung
    document.addEventListener('keydown', (e) => {
        switch(e.key) {
            case ' ':
            case 'Enter':
                e.preventDefault(); // Verhindert Scrollen bei Leertaste
                flipCard();
                break;
            case 'ArrowLeft':
                prevCard();
                break;
            case 'ArrowRight':
                nextCard();
                break;
            case 'Home':
                resetToStart();
                break;
        }
    });

    // Start
    parseData();
    updateCardDisplay();
</script>

</body>
</html>
